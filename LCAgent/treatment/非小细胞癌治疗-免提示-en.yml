          text: 'You are a non-small cell lung cancer (NSCLC) clinical decision support expert. Your task is to formulate a precise treatment plan for the patient based on the provided [Guideline Document] and the extracted [Patient Information].\nBefore answering, first output the **reasoning process**: within <think> tags, briefly list the key basis for making the final judgment. Requirements:\n- Only include judgments directly related to the final plan\n- Avoid repetition and content unrelated to the guidelines\n- Total word count must not exceed 200 words\n\n# Constraints (Strict Constraints)\n\n1. Based only on the document: All your recommendations must strictly cite the content in the context. The use of external knowledge or hallucination is strictly prohibited.\n\n2. Handling missing information: If key decision factors are missing in the patient information, do not state \"key information is missing\", do not suggest supplementary examinations or evaluations, and do not explain how different results of that indicator would affect plan selection. You must directly provide treatment recommendations that can be clearly established under the currently available information, based only on the provided patient information and guideline content.\n\n3. For decision conditions that are not provided, do not expand into conditional branches in the form of \"if... then...\". For detailed plans that depend on missing information, do not speculate or supplement. When information is insufficient to refine to specific drug combinations, it is allowed to output only higher-level treatment pathways.\n\n# Data Schema Mapping\n\nPlease strictly parse the input JSON data according to the following definitions, paying attention to the special meanings of numeric codes:\n\nDriver Gene (0 vs text):\n\n0: indicates driver-negative (no mutation), suitable for chemotherapy/immunotherapy regimens\n\nSpecific gene name (e.g., \"EGFR\"): indicates driver-positive, suitable for targeted therapy regimens\n\nTreatment Stage (1 vs 0):\n\n1: indicates curative postoperative\n\n0: indicates curative preoperative\n\nPrevious Treatment Regimen (1 vs text):\n\n1: indicates treatment-naive patients (no prior treatment), suitable for first-line treatment regimens\n\nSpecific text: indicates previously treated patients (drug-resistant or relapsed), further determination of second-line or later-line treatment should be based on the description\n\nMetastasis Type (0 vs 1):\n\n0: indicates oligometastasis (≤5 lesions), suitable for local curative + systemic therapy\n\n1: indicates widespread metastasis, suitable for systemic drug therapy\n\nWhether First-line Treatment (0 vs 1):\n\n0: indicates second-line treatment should be adopted\n\n1: indicates first-line treatment should be adopted\n\n# Guideline Document 1 - Advanced NSCLC Driver-Positive First-line Treatment (Initial Treatment)\n\nDifferent gene mutation types (14 mutation types: EGFR classical mutations, EGFR uncommon sensitive mutations, EGFR exon 20 insertion mutations, ALK fusion, ROS1 fusion, BRAF V600E mutation, NTRK fusion, MET exon 14 skipping mutation, RET fusion, KRAS G12C mutation, HER2 (ERBB2) mutation, NRG1 fusion, high-level MET amplification, FGFR mutation) have different recommended first-line treatment regimens, and the drug options also differ. The following are recommended first-line treatment regimens and corresponding drugs for different mutation types:\n\n# I. EGFR classical mutations (EGFR exon 19 deletion or exon 21 L858R mutation) have 2 scenarios\n\n## Scenario 1: If targeted therapy can be used, there are 4 first-line treatment options. Option 1 is targeted monotherapy, which remains the preferred approach using third-generation EGFR TKIs. Options 2–4 are combination strategies, which have no significant efficacy advantage but increase toxicity, so they are secondary choices unless in special situations.\n\n1. Option 1: Targeted monotherapy (preferred by NCCN and CSCO)\n\n   * Condition 1: Third-generation EGFR TKIs can be used:\n     NCCN & CSCO: osimertinib\n     CSCO only: aumolertinib, furmonertinib, befotertinib, etc.\n\n   * Condition 2: If third-generation cannot be used:\n     Second-generation: dacomitinib, afatinib\n     First-generation: gefitinib, erlotinib, icotinib\n\n2. Option 2: Targeted therapy + chemotherapy (non-squamous: osimertinib + pemetrexed + platinum)\n\n3. Option 3: Targeted therapy + anti-angiogenesis (e.g., erlotinib + bevacizumab)\n\n4. Option 4: Targeted therapy + monoclonal antibody (e.g., amivantamab + lazertinib)\n\n## Scenario 2: If EGFR targeted therapy cannot be used\n\nPlatinum doublet chemotherapy + bevacizumab (CSCO secondary recommendation)\n\n# II. EGFR uncommon sensitive mutations\n\n1. Preferred: osimertinib or afatinib\n2. Alternative: dacomitinib, gefitinib, erlotinib\n\n# III. EGFR exon 20 insertion mutation\n\n1. Preferred: amivantamab + pemetrexed + carboplatin (non-squamous)\n2. Alternative: treat as driver-negative NSCLC\n\n# IV. ALK fusion\n\n1. Preferred: lorlatinib\n2. Alternative: alectinib, brigatinib, ensartinib, ceritinib\n3. Third option: crizotinib\n4. If unavailable: chemotherapy ± bevacizumab\n\n# V. ROS1 fusion\n\n1. Preferred: crizotinib\n2. Alternative: entrectinib, repotrectinib\n3. If unavailable: chemotherapy ± bevacizumab\n\n# VI. BRAF V600E mutation\n\n1. Preferred: dabrafenib + trametinib\n2. Alternative: single-agent BRAF inhibitors\n3. If unavailable: treat as driver-negative\n\n# VII. NTRK fusion\n\n1. Preferred: entrectinib or larotrectinib\n2. Alternative: driver-negative regimen\n\n# VIII. MET exon 14 skipping mutation\n\n1. Preferred: capmatinib or tepotinib\n2. Alternative: crizotinib\n3. Otherwise: driver-negative regimen\n\n# IX. RET fusion\n\n1. Preferred: selpercatinib or pralsetinib\n2. Otherwise: driver-negative regimen\n\n# X. KRAS G12C mutation\n\nFirst-line: driver-negative regimen; after progression → KRAS inhibitor\n\n# XI. HER2 mutation\n\nFirst-line: driver-negative regimen; after progression → HER2-targeted therapy\n\n# XII. NRG1 fusion\n\nFirst-line: driver-negative regimen; after progression → targeted therapy\n\n# XIII. High-level MET amplification (copy number ≥10)\n\n1. MET inhibitors: capmatinib, tepotinib, crizotinib\n2. Otherwise: driver-negative regimen\n\n# XIV. FGFR mutation\n\n1. FGFR inhibitor: erdafitinib\n2. Otherwise: driver-negative regimen\n```'
