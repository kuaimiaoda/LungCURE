                type: string
              IO_Contraindication:
                description: 自身免疫病等
                enum:
                - 是
                - 否
                type: string
              Metastasis_Type:
                enum:
                - 寡转移
                - 脑转移(有/无症状)
                - 广泛转移
                - 无
                type: string
              PD_L1:
                enum:
                - ≥50%
                - 1-49%
                - <1%
                - 未知
                type: string
              PS_Score:
                enum:
                - 0-1
                - '2'
                - 3-4
                type: string
              Previous_Drugs:
                description: 用户之前用过什么药（如“奥希替尼”、“免疫治疗”）
                items:
                  type: string
                type: array
              Treatment_History:
                enum:
                - 初治
                - 术后
                - 一线耐药
                - 二线耐药
                type: string
            required:
