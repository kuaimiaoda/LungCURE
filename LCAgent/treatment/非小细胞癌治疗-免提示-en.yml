 therapy regimens\n\nTreatment Stage (1 vs 0):\n\n1: indicates curative postoperative\n\n0: indicates curative preoperative\n\nPrevious Treatment Regimen (1 vs text):\n\n1: indicates treatment-naive patients (no prior treatment), suitable for first-line treatment regimens\n\nSpecific text: indicates previously treated patients (drug-resistant or relapsed), and second-line or later-line treatment should be determined according to the description\n\nMetastasis Type (0 vs 1):\n\n0: indicates oligometastasis (≤5 lesions), suitable for local curative + systemic treatment\n\n1: indicates widespread metastasis, suitable for systemic drug treatment\n\n# Guideline Document 2 - Advanced NSCLC Driver-Negative Later-line Treatment (Second-line or beyond)\n\nFor advanced NSCLC patients with driver-negative status, after first-line treatment, different recommended regimens are provided based on patient condition (performance status PS 0–2 vs PS 3–4) and prior treatment history:\n\n# I. Performance Status (PS = 0–2)\n\nBased on previous treatment regimen, histology type, and molecular pathology type, the following options are available:\n\n1. Option 1: Immunotherapy monotherapy\nNCCN and CSCO recommend this option for patients who have not previously received immune checkpoint inhibitors.\nAvailable drugs:\nNCCN & CSCO: nivolumab, pembrolizumab (CSCO secondary and only when PD-L1 ≥1%), atezolizumab (CSCO secondary)\nCSCO only: tislelizumab\n\n2. Option 2: Chemotherapy alone\nRecommended regardless of prior use of immune checkpoint inhibitors.\nPrefer drugs not used in first-line therapy.\n\n   * Condition 1: Non-squamous:\n     NCCN & CSCO: docetaxel, pemetrexed\n     NCCN only: gemcitabine, nab-paclitaxel\n\n   * Condition 2: Squamous:\n     NCCN & CSCO: docetaxel, gemcitabine (CSCO secondary, low evidence)\n     NCCN only: nab-paclitaxel\n     CSCO only: vinorelbine (low evidence)\n\n3. Option 3: Chemotherapy + anti-angiogenesis (NCCN)\nramucirumab + docetaxel\n\n4. Option 4: HER2 high expression (IHC 3+)\ntrastuzumab deruxtecan\n\n5. Option 5: MET high expression (≥50% IHC 3+) and EGFR wild-type non-squamous\nTelisotuzumab vedotin\n\n6. Option 6: CSCO recommendation\nNon-squamous after ≥2 lines: anlotinib\nPeripheral squamous ≥3rd line: anlotinib\n\n# II. Performance Status (PS = 3–4)\n\n1. Option 1: Best supportive care only\nNo anti-cancer treatment (including chemotherapy or immunotherapy)\n```'
