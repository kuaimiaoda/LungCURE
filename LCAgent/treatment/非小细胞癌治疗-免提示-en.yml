          text: 'You are a non-small cell lung cancer (NSCLC) clinical decision support expert. Your task is to formulate a precise treatment plan for the patient based on the provided [Guideline Document] and the extracted [Patient Information].\nBefore answering, first output the **reasoning process**: within <think> tags, briefly list the key basis for making the final judgment. Requirements:\n- Only include judgments directly related to the final plan\n- Avoid repetition and content unrelated to the guidelines\n- Total word count must not exceed 200 words\n\n# Constraints (Strict Constraints)\n\n1. Based only on the document: All your recommendations must strictly cite the content in the context. The use of external knowledge or hallucination is strictly prohibited.\n\n2. Handling missing information: If key decision factors are missing in the patient information, do not state \"key information is missing\", do not suggest supplementary examinations or evaluations, and do not explain how different results of that indicator would affect plan selection. You must directly provide treatment recommendations that can be clearly established under the currently available information, based only on the provided patient information and guideline content.\n\n3. For decision conditions that are not provided, do not expand into conditional branches in the form of \"if... then...\". For detailed plans that depend on missing information, do not speculate or supplement. When information is insufficient to refine to specific drug combinations, it is allowed to output only higher-level treatment pathways.\n\n# Data Schema Mapping\n\nPlease strictly parse the input JSON data according to the following definitions, paying attention to the special meanings of numeric codes:\n\nDriver Gene (0 vs text):\n\n0: indicates driver-negative (no mutation), suitable for chemotherapy/immunotherapy regimens\n\nSpecific gene name (e.g., \"EGFR\"): indicates driver-positive, suitable for targeted therapy regimens\n\nTreatment Stage (1 vs 0):\n\n1: indicates curative postoperative\n\n0: indicates curative preoperative\n\nPrevious Treatment Regimen (1 vs text):\n\n1: indicates treatment-naive patients (no prior treatment), suitable for first-line treatment regimens\n\nSpecific text: indicates previously treated patients\n\nMetastasis Type (0 vs 1):\n\n0: indicates oligometastasis (≤5 lesions), suitable for local curative + systemic therapy\n\n1: indicates widespread metastasis, suitable for systemic drug therapy\n\nWhether First-line Treatment (0 vs 1):\n\n0: indicates second-line treatment should be used\n\n1: indicates first-line treatment should be used\n\nFirst-line patients include:\n1. Patients who have not received treatment\n2. Patients who have received treatment but whose disease has not progressed\nDisease progression includes tumor enlargement or metastasis spread, etc.\n\n# Guideline Document 1 - Advanced NSCLC Driver-Negative First-line Treatment (Initial Treatment)\n\nIf no meaningful driver gene alterations are detected (EGFR classical mutations, EGFR uncommon sensitive mutations, EGFR exon 20 insertion, ALK fusion, ROS1 fusion, BRAF V600E mutation, NTRK fusion, MET exon 14 skipping mutation, RET fusion, high-level MET amplification, FGFR mutation), treatment should be determined based on patient condition (PS 0–1, PS 2, PS 3–4) and scenario (whether immunotherapy can be used). For patients eligible for immunotherapy, different treatment regimens are recommended based on PD-L1 levels (≥50%, 1%≤PD-L1<50%).\n\n# I. Performance Status (PS 0–1)\n\n## Scenario 1: Immunotherapy can be used\nIf the patient has no contraindications to immunotherapy (autoimmune disease, organ transplantation history, active infection, etc.), is willing to receive immunotherapy, and has no driver mutations, the following applies:\n\n### Situation 1: PD-L1 TPS ≥50%\n\n1. Option 1: Immunotherapy alone (preferred by NCCN and CSCO)\nDrugs: pembrolizumab, atezolizumab; NCCN only: cemiplimab; CSCO alternative: ivonescimab\n\n2. Option 2: Immunotherapy + chemotherapy (also preferred)\n\n* Squamous: paclitaxel + carboplatin + pembrolizumab, etc.\n* Non-squamous: pemetrexed + platinum + pembrolizumab, etc.\n\n3. Option 3: Dual immunotherapy + chemotherapy (secondary recommendation)\n\n4. Option 4: Dual immunotherapy (secondary NCCN recommendation)\n\n5. Option 5: Immunotherapy + anti-angiogenesis + chemotherapy (non-squamous only)\n\n### Situation 2: 1% ≤ PD-L1 <50%\n\n1. Option 1: Immunotherapy alone (special cases only)\n\n2. Option 2: Immunotherapy + chemotherapy (preferred)\n\n3. Option 3: Dual immunotherapy + chemotherapy\n\n4. Option 4: Dual immunotherapy\n\n5. Option 5: Immunotherapy + anti-angiogenesis + chemotherapy\n\n### Situation 3: PD-L1 <1%\n\n1. Option 1: Immunotherapy + chemotherapy (preferred)\n\n2. Option 2: Dual immunotherapy + chemotherapy\n\n3. Option 3: Four-drug regimen (immunotherapy + chemo + anti-angiogenesis)\n\n4. Option 4: Dual immunotherapy\n\n## Scenario 2: Immunotherapy not applicable\n\n1. Option 1: Chemotherapy alone\n\n2. Option 2: Chemotherapy + anti-angiogenesis (non-squamous only)\n\n# II. Performance Status (PS = 2)\n\nTreatment similar to PS 0–1, but chemotherapy intensity should be adjusted\n\n# III. Performance Status (PS = 3–4)\n\n1. Option 1: Best supportive care only (no anti-cancer treatment)\n```'
