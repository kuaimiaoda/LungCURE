            \ features: pleura, bronchus, chest wall, rib, phrenic nerve, diaphragm,\
            \ pericardium, great vessels, heart, trachea, carina, vertebra.\n- Obstructive\
            \ change: obstructive pneumonia, atelectasis, lung collapse.\n- Ipsilateral\
            \ intrapulmonary dissemination: nodules in the same lobe or different\
            \ ipsilateral lobes, including suspicious or indeterminate lesions if\
            \ malignancy / metastasis cannot be excluded.\n- Bilateral lung statements:\
            \ if bilateral pulmonary nodules are described without excluding the reference\
            \ side, explicitly annotate that the reference side is involved so downstream\
            \ T staging can detect ipsilateral spread.\n\nDo not extract\n- Contralateral\
            \ lung lesions (these belong to M1a).\n- Distant organ metastases.\n-\
            \ Pleural effusion or pericardial effusion.\n- Lymph nodes.\n- Pleural\
            \ metastasis or chest wall metastasis as distant metastatic disease.\n\
            - Clearly benign findings such as simple cysts, calcification, or purely\
            \ inflammatory linear opacities unless specifically flagged as suspicious.\n\
            \nProcessing rules\n- “Ill-defined”, “poorly demarcated”, “abutting”,\
            \ and “traction” should be captured as invasion-related evidence when\
            \ they refer to relevant adjacent structures.\n- Merge descriptive details\
            \ into each retained item.\n- Do not output pure feature fragments as\
            \ separate items; attach them to the corresponding lesion.\n\nOutput JSON\
            \ only:\n{\n  \"t_assessment_context\": [\n    \"...\"\n  ]\n}"
