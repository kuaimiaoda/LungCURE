    - data:
        code: "\nimport json\nimport re\n\ndef main(t: str, n: str, m: str) -> dict:\n\
          \    def safe_parse(json_str):\n        if not json_str:\n            return\
          \ {}\n        try:\n            clean_str = re.sub(r'^```json\\s*', '',\
          \ str(json_str).strip())\n            clean_str = re.sub(r'\\s*```$', '',\
          \ clean_str)\n            return json.loads(clean_str)\n        except Exception:\n\
          \            return {}\n\n    def normalize_stage(stage: str) -> str:\n\
          \        if stage is None:\n            return \"\"\n        s = str(stage).upper().strip()\n\
          \        s = re.sub(r'\\s+', '', s)\n        s = re.sub(r'^(?:Y?P|Y?C|R)+',\
          \ '', s)\n        if s == 'TX':\n            return 'T0'\n        if s ==\
          \ 'NX':\n            return 'N0'\n        if s == 'MX':\n            return\
          \ 'M0'\n        return s\n\n    def format_criteria(criteria_list):\n  \
          \      if not criteria_list:\n            return \"  - *No specific matched\
          \ criteria*\\n\"\n        lines = []\n        for i in criteria_list:\n\
          \            stage_level = i.get('stage_level', '')\n            description\
          \ = i.get('description', '')\n            location = i.get('location')\n\
          \            count_type = i.get('count_type')\n            extra_parts =\
          \ []\n            if location:\n                extra_parts.append(str(location))\n\
          \            if count_type:\n                extra_parts.append(str(count_type))\n\
          \            if extra_parts and description:\n                text = f\"\
          {description} ({', '.join(extra_parts)})\"\n            elif extra_parts:\n\
          \                text = \", \".join(extra_parts)\n            else:\n  \
          \              text = description\n            lines.append(f\"  - **[{stage_level}]**\
          \ {text}\\n\")\n        return \"\".join(lines)\n\n    def format_uncertainty(uncertain_list):\n\
          \        if not uncertain_list:\n            return \"\"\n        lines\
          \ = []\n        for i in uncertain_list:\n            name = i.get('node_name')\
          \ or i.get('description', 'Unknown finding')\n            impact = i.get('impact_description')\
          \ or i.get('potential_impact') or i.get('reason', '')\n            lines.append(f\"\
          \  - {name} — *{impact}*\\n\")\n        return \"\\n**⚠️ Indeterminate /\
          \ follow-up findings:**\\n\" + \"\".join(lines)\n\n    def get_n_weight(n_stage):\n\
          \        clean_n = normalize_stage(n_stage)\n        mapping = {'N0': 0,\
          \ 'N1': 1, 'N2': 2, 'N3': 3}\n        return mapping.get(clean_n, -1)\n\n\
          \    def calculate_stage_by_set(final_t, final_n, final_m):\n        T =\
          \ normalize_stage(final_t)\n        N = normalize_stage(final_n)\n     \
          \   M = normalize_stage(final_m)\n        current_combo = f\"{T}{N}{M}\"\
          \n        if M == 'M1C':\n            return 'Stage IVB'\n        if M in\
          \ ('M1A', 'M1B'):\n            return 'Stage IVA'\n        stage_rules =\
          \ {\n            \"Stage IA1\": {\"T1AN0M0\"},\n            \"Stage IA2\"\
          : {\"T1BN0M0\"},\n            \"Stage IA3\": {\"T1CN0M0\"},\n          \
          \  \"Stage IB\": {\"T2AN0M0\"},\n            \"Stage IIA\": {\"T2BN0M0\"\
          },\n            \"Stage IIB\": {\"T1AN1M0\", \"T1BN1M0\", \"T1CN1M0\", \"\
          T2AN1M0\", \"T2BN1M0\", \"T3N0M0\"},\n            \"Stage IIIA\": {\"T1AN2M0\"\
          , \"T1BN2M0\", \"T1CN2M0\", \"T2AN2M0\", \"T2BN2M0\", \"T3N1M0\", \"T4N0M0\"\
          , \"T4N1M0\"},\n            \"Stage IIIB\": {\"T1AN3M0\", \"T1BN3M0\", \"\
          T1CN3M0\", \"T2AN3M0\", \"T2BN3M0\", \"T3N2M0\", \"T4N2M0\"},\n        \
          \    \"Stage IIIC\": {\"T3N3M0\", \"T4N3M0\"}\n        }\n        for stage_name,\
          \ combinations in stage_rules.items():\n            if current_combo in\
          \ combinations:\n                return stage_name\n        if M == 'M0':\n\
          \            if N == 'N3':\n                if T.startswith('T1') or T.startswith('T2'):\n\
          \                    return 'Stage IIIB'\n                if T.startswith('T3')\
          \ or T.startswith('T4'):\n                    return 'Stage IIIC'\n    \
          \        if N == 'N2':\n                if T.startswith('T1') or T.startswith('T2'):\n\
          \                    return 'Stage IIIA'\n                if T.startswith('T3')\
          \ or T.startswith('T4'):\n                    return 'Stage IIIB'\n    \
          \        if N == 'N1':\n                if T.startswith('T1') or T.startswith('T2'):\n\
          \                    return 'Stage IIB'\n                if T.startswith('T3')\
          \ or T.startswith('T4'):\n                    return 'Stage IIIA'\n    \
          \        if N == 'N0':\n                if T == 'T2A':\n               \
          \     return 'Stage IB'\n                if T == 'T2B':\n              \
          \      return 'Stage IIA'\n                if T.startswith('T2'):\n    \
          \                return 'Stage IB or IIA'\n                if T.startswith('T3'):\n\
          \                    return 'Stage IIB'\n                if T.startswith('T4'):\n\
          \                    return 'Stage IIIA'\n        return 'Manual review\
          \ required'\n\n    t_data = safe_parse(t)\n    n_data = safe_parse(n)\n\
          \    m_data = safe_parse(m)\n    final_t = t_data.get('final_t_stage', 'Tx')\n\
          \    final_n = n_data.get('final_n_stage', 'Nx')\n    final_m = m_data.get('final_m_stage',\
          \ 'Mx')\n    normalized_t = normalize_stage(final_t)\n    normalized_n =\
          \ normalize_stage(final_n)\n    normalized_m = normalize_stage(final_m)\n\
          \    stage_result = calculate_stage_by_set(final_t, final_n, final_m)\n\
          \    potential_scenarios = {}\n    uncertain_nodes = n_data.get('uncertain_nodes',\
          \ [])\n    current_weight = get_n_weight(final_n)\n    if uncertain_nodes:\n\
          \        for node in uncertain_nodes:\n            proj_stage = node.get('projected_stage')\n\
          \            proj_weight = get_n_weight(proj_stage)\n            if proj_weight\
          \ > current_weight:\n                node_name = node.get('node_name', 'Unknown\
          \ site')\n                if proj_stage not in potential_scenarios:\n  \
          \                  calculated_tnm = calculate_stage_by_set(final_t, proj_stage,\
          \ final_m)\n                    potential_scenarios[proj_stage] = {\"tnm_stage\"\
          : calculated_tnm, \"weight\": proj_weight, \"nodes\": [node_name]}\n   \
          \             else:\n                    potential_scenarios[proj_stage][\"\
          nodes\"].append(node_name)\n    sorted_scenarios = sorted(potential_scenarios.items(),\
          \ key=lambda x: x[1]['weight'])\n    md = \"# \U0001FA7A Lung Cancer TNM\
          \ Staging Report\\n\\n\"\n    md += \"## \U0001F3C1 Overall Stage\\n\"\n\
          \    md += f\"### **{stage_result}**\\n\"\n    md += f\"> **Current confirmed\
          \ TNM combination:** {normalized_t} {normalized_n} {normalized_m}\\n\"\n\
          \    if sorted_scenarios:\n        md += \"\\n⚠️ **Potential stage-up scenarios:**\\\
          n\"\n        for p_n, info in sorted_scenarios:\n            nodes_str =\
          \ \" or \".join(info['nodes'])\n            md += f\"> * If **{nodes_str}**\
          \ is confirmed positive ({normalize_stage(p_n)})\\n\"\n            md +=\
          \ f\">   stage would increase to **{info['tnm_stage']}** (combination: {normalized_t}{normalize_stage(p_n)}{normalized_m})\\\
          n\"\n            md += \">\\n\"\n    md += \"\\n---\\n\\n\"\n    md += f\"\
          ### \U0001FAC1 T stage: {normalized_t}\\n\"\n    md += \"**Matched criteria:**\\\
          n\" + format_criteria(t_data.get('matched_criteria', []))\n    if t_data.get('logic_analysis'):\n\
          \        md += f\"> *Analysis: {t_data['logic_analysis']}*\\n\\n\"\n   \
          \ md += f\"### \U0001F9EC N stage: {normalized_n}\\n\"\n    md += \"**Matched\
          \ criteria:**\\n\" + format_criteria(n_data.get('matched_criteria', []))\n\
          \    md += format_uncertainty(n_data.get('uncertain_nodes', []))\n    if\
          \ n_data.get('logic_analysis'):\n        md += f\"> *Analysis: {n_data['logic_analysis']}*\\\
          n\\n\"\n    md += f\"### \U0001F50D M stage: {normalized_m}\\n\"\n    md\
          \ += \"**Matched criteria:**\\n\" + format_criteria(m_data.get('matched_criteria',\
          \ []))\n    md += format_uncertainty(m_data.get('uncertain_findings', []))\n\
          \    if m_data.get('logic_analysis'):\n        md += f\"> *Analysis: {m_data['logic_analysis']}*\\\
          n\"\n    return {\"result\": md}\n"
