    - data:
        code: "\nimport json\nimport re\n\ndef main(arg1: str) -> dict:\n    \"\"\"\
          \n    分流节点处理脚本\n    输入: 上游清洗专家输出的 JSON 字符串 (包含 n_assessment_context, m_assessment_context)\n\
          \    输出: 字典，包含格式化后的 N 分期描述文本和 M 分期描述文本\n    \"\"\"\n\n    # --- 1. 基础解析工具\
          \ (复用您提供的逻辑) ---\n    def safe_parse(json_input):\n        if not json_input:\
          \ return {}\n        try:\n            # 兼容输入已经是 dict 的情况\n            if\
          \ isinstance(json_input, dict):\n                return json_input\n   \
          \         \n            # 清理 Markdown 代码块标记\n            clean_str = str(json_input).strip()\n\
          \            clean_str = re.sub(r'^```json\\s*', '', clean_str)\n      \
          \      clean_str = re.sub(r'\\s*```$', '', clean_str)\n            return\
          \ json.loads(clean_str)\n        except Exception as e:\n            # 返回空字典或打印错误日志\n\
          \            print(f\"JSON Parse Error: {e}\")\n            return {}\n\n\
          \    # --- 2. 格式化工具 ---\n    def format_context_list(data_list, default_msg=\"\
          未提及相关病灶\"):\n        \"\"\"\n        将 JSON 列表转换为适合 Prompt 的无序列表文本\n   \
          \     例如: [\"A\", \"B\"] -> \"- A\\n- B\"\n        \"\"\"\n        if not\
          \ data_list or not isinstance(data_list, list):\n            return default_msg\n\
          \        \n        # 过滤空字符串并拼接\n        valid_items = [f\"- {str(item)}\"\
          \ for item in data_list if item]\n        if not valid_items:\n        \
          \    return default_msg\n            \n        return \"\\n\".join(valid_items)\n\
          \n    # --- 3. 执行解析 ---\n    data = safe_parse(arg1)\n\n    # 提取 N 和 M 的原始列表\
          \ (容错处理：如果键不存在，返回空列表)\n    raw_n_list = data.get(\"n_assessment_context\"\
          , [])\n    raw_m_list = data.get(\"m_assessment_context\", [])\n\n    #\
          \ --- 4. 格式化为下游变量 ---\n    # 将列表转换为字符串，准备喂给 N/M 分期助手\n    n_context_text\
          \ = format_context_list(raw_n_list, default_msg=\"未提及区域淋巴结相关异常。\")\n   \
          \ m_context_text = format_context_list(raw_m_list, default_msg=\"未提及远处转移或非区域淋巴结异常。\"\
          )\n\n    # --- 5. 返回结果 ---\n    # 这里返回的字典中的 key 可以在工作流中被映射为两个独立的变量\n   \
          \ return {\n        \"n_descriptions\": n_context_text,\n        \"m_descriptions\"\
          : m_context_text\n    }\n"
