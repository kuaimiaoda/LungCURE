          \ ---\n    def safe_parse(json_input):\n        if not json_input: \n  \
          \          return {}\n        try:\n            # 兼容输入已经是 dict 的情况\n   \
          \         if isinstance(json_input, dict):\n                return json_input\n\
          \            \n            # 清理 Markdown 代码块标记\n            clean_str =\
          \ str(json_input).strip()\n            clean_str = re.sub(r'^```json\\s*',\
          \ '', clean_str)\n            clean_str = re.sub(r'\\s*```$', '', clean_str)\n\
          \            return json.loads(clean_str)\n        except Exception as e:\n\
          \            print(f\"JSON Parse Error: {e}\")\n            return {}\n\n\
          \    # --- 2. 格式化工具 ---\n    def format_context_list(data_list, default_msg=\"\
          未提及相关病灶\"):\n        \"\"\"\n        将 JSON 列表转换为适合 Prompt 的无序列表文本\n   \
