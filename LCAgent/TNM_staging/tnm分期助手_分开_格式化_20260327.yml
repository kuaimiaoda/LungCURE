            区域淋巴结补充：奇食窝淋巴结（第8组或第9组）、心膈角淋巴结（第9组）、上腔静脉右旁淋巴结（3A组


            非区域常见类型包括但不限于：

            - **常见非区域淋巴结举例**：

            1、包括腋窝淋巴结（分为胸肌淋巴结、外侧淋巴结、肩胛下淋巴结、中央淋巴结和尖淋巴结五群），锁骨下淋巴结也属于腋窝淋巴结的一部分

            2、除锁骨上淋巴结以外的颈部淋巴结，如颈动脉旁淋巴结

            颈部淋巴结包括：

            Ⅰ区（颏下及颌下淋巴结区）

