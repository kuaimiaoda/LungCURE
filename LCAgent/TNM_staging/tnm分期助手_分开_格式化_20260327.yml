            \ MAX(N1, N2, N3)。\n\n\n# 肺癌N分期相关文档提取\n\n## 一、N分期核心概念\nN分期代表**区域淋巴结转移情况**，是肺癌TNM分期（临床分期cTNM、病理分期pTNM）的三大核心维度之一，用于评估肿瘤是否侵犯及侵犯哪些区域淋巴结，直接影响肺癌综合分期及治疗方案选择。N分期仅针对“区域淋巴结”，非区域淋巴结转移归属于M分期（远处转移）。\n\
            \n\n## 二、N分期各等级定义\n### 1. Nx（区域淋巴结无法评估）\n- **定义**：通过体格检查、影像学检查（CT、PET-CT等）、病理活检等手段，无法判断区域淋巴结是否存在转移或是否受累。\n\
            \n\n### 2. N0（无区域淋巴结转移）\n- **定义**：所有区域淋巴结（具体范围见“三、区域淋巴结列表”）均未发现转移迹象，包括无直接侵犯或影像学、病理学证据支持的转移。\n\
            \n\n### 3. N1（同侧支气管周围/肺门/肺内淋巴结转移）\n- **核心定义**：同侧支气管周围及（或）同侧肺门淋巴结，以及（或）肺内淋巴结存在转移（含肿瘤直接侵犯）。\n\
            - **对应区域淋巴结组**：同侧第10、11、12、13、14组淋巴结（具体淋巴结位置见“三、区域淋巴结列表”）。\n\n\n### 4.\
            \ N2（同侧纵隔内/隆突下淋巴结转移）\n- **核心定义**：同侧纵隔内及（或）隆突下淋巴结存在转移。\n- **对应区域淋巴结组**：同侧第2、3、4、5、6、7、8、9组淋巴结（具体淋巴结位置见“三、区域淋巴结列表”）。\n\
            \n\n### 5. N3\n- **核心定义**：对侧纵隔、对侧肺门(双肺门)、同侧或对侧前斜角肌及锁骨上淋巴结存在转移。\n- **对应区域淋巴结组**：第1组淋巴结（锁骨上淋巴结）。\n\
            - **侧别判断说明**：\n  - 同侧：病灶所在侧与淋巴结所在侧一致（如“右侧肺占位+右侧肺门淋巴结”为同侧）。\n  - 对侧：病灶所在侧与淋巴结所在侧相反（如“右侧肺占位+左侧肺门淋巴结”为对侧）。\n\
            - **颈部淋巴结特殊说明**：颈部淋巴结中，仅**锁骨上淋巴结（第1组，归属于颈部V区）** 属于区域淋巴结；其余颈部淋巴结（如颏下、颌下、颈内静脉上/中/下组等，对应颈部Ⅰ-Ⅳ区、Ⅵ区）均不属于区域淋巴结，其转移归为M分期。\n\
            \n区域淋巴结：\n1前斜角肌及锁骨上淋巴结\n2R右上气管旁淋巴结\n2L左上气管旁淋巴结\n3a血管前淋巴结\n3p气管后淋巴结\n4R右下气管旁淋巴结\n\
