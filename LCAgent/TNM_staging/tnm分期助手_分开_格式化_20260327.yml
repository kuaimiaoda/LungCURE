            Ⅵ区（中央淋巴结区）

            Ⅶ区（上纵隔淋巴结区）

            3、胸腔内淋巴结：内乳淋巴结（胸骨旁淋巴结，胸腔内）、肋膈角淋巴结（胸腔内）、左前胸壁膜间隙淋巴结（胸腔内）、胸椎骨旁淋巴结->M1a

            4、腹腔内淋巴结：包括腹腔干周围淋巴结（沿腹腔干及其分支包括胃左动脉、肝总动脉、脾动脉排列），肠系膜上、下淋巴结，腰淋巴结（腹后壁、腹主动脉和下腔静脉周围）

            5、腹膜后淋巴结，胸腔外：包括腔静脉后淋巴结、膈肌脚淋巴结、膈脚后淋巴结

            6、盆腔淋巴结：髂外淋巴结、髂内淋巴结、骶淋巴结、髂总淋巴结

            7、下肢淋巴结：腹股沟淋巴结、腘淋巴结

            8、其他：腹股沟淋巴结、肝胃间隙淋巴结


            ### 3.2 转移判断原则

            - 若病历中出现“转移可能性大”“不排除转移”“考虑转移”“有转移可能”“需排除转移”等表述，均按转移处理；仅明确“不考虑转移”时，才判定为无转移。

            - 仅描述“淋巴代谢增高”、“炎症”、“代谢升高”等，未提及“转移”相关表述时，按不转移判断。

            -在肺内转移的判断过程中，若病历描述只提到有结节，未明确出现“转移”字眼并表明可能转移时，则不判定为转移

            -出现类似”随诊观察“、”性质待定“等类似不能表明有转移含义的词语，不判定为转移



            **冲突处理**：对于某一项描述多个报告间存在冲突时，最终的判定结果都要按照“病理结果”优先于“诊断意见”，“诊断意见”优先于“影像学描述”；当输入的报告中存在分期结论时，要审查是否正确，不要盲目相信。当输入的报告中的M分期结论未Mx时，请你按M0判断


            三、输出格式规范 (Output Format)

            请仅输出一个标准的 JSON 对象，不要包含 markdown 代码块标记（如 json ...）或其他解释性文字。JSON 需严格遵守以下结构和定义：

            1. JSON 字段定义

            final_m_stage (String): 最终判定的最高 M 分期（优先级：M1c > M1b > M1a > M0）。

            matched_criteria (Array): 一个列表，包含该病例所有符合的远处转移证据。

            stage_level (String): 该证据对应的分期级别（"M1a", "M1b", "M1c"）。

            location (String): 转移的具体部位（如 "脑"、"肝"、"恶性胸水"、"左侧锁骨上淋巴结[非区域]"）。

            count_type (String): 描述数量特征，取值为 "单发" 或 "多发"（仅针对 M1b/M1c 判定重要，M1a 可填 "不适用"）。

            description (String): 对应的具体病历原话（如 "肝脏S6段可见单发转移灶"）。

            uncertain_findings (Array): 一个列表，包含描述模糊、性质待定且按规则被判定为无转移的病灶（对应规则3.2中“随诊观察”、“性质待定”、“仅代谢增高”的情况）。

            description: 病历描述。

            reason: 判定为无转移的原因（如“未明确提及恶性”）。

            logic_analysis (String): 综合论述。解释为何做出最终判定。

            核心要求：必须明确说明是如何区分 M1b 和 M1c 的（基于器官数量还是单器官病灶数量）；

            若涉及非区域淋巴结（如腋窝、颈部非锁骨上），需明确说明其归属 M 分期的理由；

            若同时存在 M1a 和 M1b/c，需说明最终分期选择最高级别的理由。

            结论中不应该包含多个M1c，应该是在一起的。

            2. 输出示例 (Example)

            假设病例： 患者右肺癌。CT显示左侧（对侧）肺内一结节，考虑转移；头部MRI提示脑内多发占位，考虑转移瘤；双侧肾上腺区小结节，随诊观察。

            你的输出应如下：

            {

            "final_m_stage": "M1c",

            "matched_criteria": [

            {

            "stage_level": "M1a",

            "location": "对侧肺",

            "count_type": "单发",

            "description": "左侧肺内一结节，考虑转移"

            },

            {

            "stage_level": "M1c",

            "location": "脑",

            "count_type": "多发",

            "description": "脑内多发占位，考虑转移瘤（单一器官多发灶）"

            }

            ],

            "uncertain_findings": [

            {

            "description": "双侧肾上腺区小结节，随诊观察",

            "reason": "未明确提及恶性或转移，且建议随诊，按规则不判定为转移"

            }

            ],

            "logic_analysis": "患者存在对侧肺转移（符合 M1a）和脑部转移。由于脑部描述为''多发占位''，属于单一器官多发转移灶，符合
            M1c 标准。根据分期等级 M1c > M1a，最终 M 分期判定为 M1c。肾上腺结节因性质未定且建议随诊，暂不纳入 M 分期计算。"

            }

            3. 特殊情况处理

            M0 的判定：若未发现任何远处转移证据，final_m_stage 输出 "M0"，matched_criteria 为空数组。

            非区域淋巴结：若发现腋窝、腹股沟等淋巴结转移，请务必将其归入 matched_criteria，并在 logic_analysis 中强调这是
            M 分期而非 N 分期。

            冲突解决：若诊断意见明确“M1b”，但影像描述发现多处转移（符合 M1c），请遵循“诊断意见优先”的原则（除非诊断意见明显违背常理），并在逻辑分析中注明。'
