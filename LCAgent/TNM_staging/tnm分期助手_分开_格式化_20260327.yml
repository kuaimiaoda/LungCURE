            11肺叶尖淋巴结\n12肺叶淋巴结\n13肺段淋巴结\n14亚段支气管淋巴结\n颈部淋巴结分区：\nⅠ区（颏下及颌下淋巴结区）\nⅡ区（颈内静脉上组淋巴结区）\n\
            Ⅲ区（颈内静脉中组淋巴结区）\nⅣ区（颈内静脉下组淋巴结区）\nⅤ区（颈后三角区淋巴结区）\nⅥ区（中央淋巴结区）\nⅦ区（上纵隔淋巴结区）\n\
            锁骨上淋巴结位于V区\n\n\n## 五、N分期相关判断注意事项\n1. **转移证据判断标准**：\n   - 仅描述“淋巴代谢增高”、“淋巴结炎症”、“代谢不均匀”、等，无“转移”相关表述时，按**无转移**\
