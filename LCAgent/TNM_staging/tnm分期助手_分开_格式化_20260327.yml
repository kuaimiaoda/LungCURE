    - data:
        code: "import json\nimport re\n\n\ndef main(t: str, n: str, m: str) -> dict:\n\
          \    # --- 1. 基础解析工具 ---\n    def safe_parse(json_str):\n        if not\
          \ json_str:\n            return {}\n        try:\n            clean_str\
          \ = re.sub(r'^```json\\s*', '', str(json_str).strip())\n            clean_str\
          \ = re.sub(r'\\s*```$', '', clean_str)\n            return json.loads(clean_str)\n\
          \        except Exception:\n            return {}\n\n    def normalize_stage(stage:\
          \ str) -> str:\n        \"\"\"\n        标准化 TNM 分期字符串：\n        - 转大写\n\
          \        - 去空格\n        - 仅去除前缀性的临床/病理/治疗后标记\n          例如：cT3 -> T3, pN2\
          \ -> N2, ypT1c -> T1C\n        - 不破坏 T1C / M1C 这类合法后缀\n        \"\"\"\n\
          \        if stage is None:\n            return \"\"\n        s = str(stage).upper().strip()\n\
          \        s = re.sub(r'\\s+', '', s)\n        # 只移除开头连续出现的前缀标记，不影响后缀 a/b/c\n\
          \        # 支持常见前缀：c, p, yc, yp, r, rp\n        s = re.sub(r'^(?:Y?P|Y?C|R)+',\
          \ '', s)\n            # 统一把 X 当成 0\n        if s == 'TX':\n            return\
          \ 'T0'\n        if s == 'NX':\n            return 'N0'\n        if s ==\
          \ 'MX':\n            return 'M0'\n        return s\n\n    def format_criteria(criteria_list):\n\
          \        if not criteria_list:\n            return \"  - *无特定匹配描述*\\n\"\n\
          \n        lines = []\n        for i in criteria_list:\n            stage_level\
          \ = i.get('stage_level', '')\n            description = i.get('description',\
          \ '')\n            location = i.get('location')\n            count_type\
          \ = i.get('count_type')\n\n            extra_parts = []\n            if\
          \ location:\n                extra_parts.append(str(location))\n       \
          \     if count_type:\n                extra_parts.append(str(count_type))\n\
          \n            if extra_parts and description:\n                text = f\"\
          {description}（{'，'.join(extra_parts)}）\"\n            elif extra_parts:\n\
          \                text = \"，\".join(extra_parts)\n            else:\n   \
          \             text = description\n\n            lines.append(f\"  - **[{stage_level}]**\
          \ {text}\\n\")\n\n        return \"\".join(lines)\n\n    def format_uncertainty(uncertain_list):\n\
          \        if not uncertain_list:\n            return \"\"\n\n        lines\
          \ = []\n        for i in uncertain_list:\n            name = i.get('node_name')\
          \ or i.get('description', '未知节点')\n            impact = (\n            \
          \    i.get('impact_description')\n                or i.get('potential_impact')\n\
          \                or i.get('reason', '')\n            )\n            lines.append(f\"\
          \  - {name} —— *{impact}*\\n\")\n\n        return \"\\n**⚠️ 待定/需关注:**\\\
          n\" + \"\".join(lines)\n\n    def get_n_weight(n_stage):\n        clean_n\
          \ = normalize_stage(n_stage)\n        mapping = {'N0': 0, 'N1': 1, 'N2':\
          \ 2, 'N3': 3}\n        return mapping.get(clean_n, -1)\n\n    # --- 2. 核心逻辑：基于集合的分期查表器\
          \ ---\n    def calculate_stage_by_set(final_t, final_n, final_m):\n    \
          \    T = normalize_stage(final_t)\n        N = normalize_stage(final_n)\n\
          \        M = normalize_stage(final_m)\n        current_combo = f\"{T}{N}{M}\"\
          \n\n        # 远处转移优先判断\n        if M == 'M1C':\n            return 'IVB期'\n\
          \        if M in ('M1A', 'M1B'):\n            return 'IVA期'\n        if\
          \ M in ('MX', 'M X'):\n            return '无法评估 (Mx)'\n\n        stage_rules\
          \ = {\n            \"IA1期\": {\"T1AN0M0\"},\n            \"IA2期\": {\"T1BN0M0\"\
          },\n            \"IA3期\": {\"T1CN0M0\"},\n            \"IB期\":  {\"T2AN0M0\"\
          },\n            \"IIA期\": {\"T2BN0M0\"},\n            \"IIB期\": {\n    \
          \            \"T1AN1M0\", \"T1BN1M0\", \"T1CN1M0\",\n                \"\
          T2AN1M0\", \"T2BN1M0\",\n                \"T3N0M0\"\n            },\n  \
          \          \"IIIA期\": {\n                \"T1AN2M0\", \"T1BN2M0\", \"T1CN2M0\"\
          ,\n                \"T2AN2M0\", \"T2BN2M0\",\n                \"T3N1M0\"\
          ,\n                \"T4N0M0\", \"T4N1M0\"\n            },\n            \"\
          IIIB期\": {\n                \"T1AN3M0\", \"T1BN3M0\", \"T1CN3M0\",\n   \
          \             \"T2AN3M0\", \"T2BN3M0\",\n                \"T3N2M0\", \"\
          T4N2M0\"\n            },\n            \"IIIC期\": {\n                \"T3N3M0\"\
          , \"T4N3M0\"\n            }\n        }\n\n        for stage_name, combinations\
          \ in stage_rules.items():\n            if current_combo in combinations:\n\
          \                return stage_name\n\n        # 容错逻辑：部分 T 分期可能是 T2 / T2A\
          \ / T2B 这种不完全统一格式\n        if M == 'M0':\n            if N == 'N3':\n  \
          \              if T.startswith('T1') or T.startswith('T2'):\n          \
          \          return 'IIIB期'\n                if T.startswith('T3') or T.startswith('T4'):\n\
          \                    return 'IIIC期'\n\n            if N == 'N2':\n     \
          \           if T.startswith('T1') or T.startswith('T2'):\n             \
          \       return 'IIIA期'\n                if T.startswith('T3') or T.startswith('T4'):\n\
          \                    return 'IIIB期'\n\n            if N == 'N1':\n     \
          \           if T.startswith('T1') or T.startswith('T2'):\n             \
          \       return 'IIB期'\n                if T.startswith('T3'):\n        \
          \            return 'IIIA期'\n                if T.startswith('T4'):\n  \
          \                  return 'IIIA期'\n\n            if N == 'N0':\n       \
          \         if T == 'T2A':\n                    return 'IB期'\n           \
          \     if T == 'T2B':\n                    return 'IIA期'\n              \
          \  if T.startswith('T2'):\n                    return 'IB期或IIA期'\n     \
          \           if T.startswith('T3'):\n                    return 'IIB期'\n\
          \                if T.startswith('T4'):\n                    return 'IIIA期'\n\
          \n        return \"需人工核定\"\n\n    # --- 3. 执行解析 ---\n    t_data = safe_parse(t)\n\
          \    n_data = safe_parse(n)\n    m_data = safe_parse(m)\n\n    final_t =\
          \ t_data.get('final_t_stage', 'Tx')\n    final_n = n_data.get('final_n_stage',\
          \ 'Nx')\n    final_m = m_data.get('final_m_stage', 'Mx')\n\n    normalized_t\
          \ = normalize_stage(final_t)\n    normalized_n = normalize_stage(final_n)\n\
          \    normalized_m = normalize_stage(final_m)\n\n    # --- 4. 计算综合分期（确诊版）\
          \ ---\n    stage_result = calculate_stage_by_set(final_t, final_n, final_m)\n\
          \n    # --- 5. 计算潜在分期（多场景版） ---\n    potential_scenarios = {}  # Key: Projected\
          \ N, Value: {tnm_stage, nodes_list}\n\n    uncertain_nodes = n_data.get('uncertain_nodes',\
          \ [])\n    current_weight = get_n_weight(final_n)\n\n    if uncertain_nodes:\n\
          \        for node in uncertain_nodes:\n            proj_stage = node.get('projected_stage')\n\
          \            proj_weight = get_n_weight(proj_stage)\n\n            # 只要潜在分期比当前分期重，就记录下来\n\
          \            if proj_weight > current_weight:\n                node_name\
          \ = node.get('node_name', '未知部位')\n\n                if proj_stage not in\
          \ potential_scenarios:\n                    calculated_tnm = calculate_stage_by_set(final_t,\
          \ proj_stage, final_m)\n                    potential_scenarios[proj_stage]\
          \ = {\n                        \"tnm_stage\": calculated_tnm,\n        \
          \                \"weight\": proj_weight,\n                        \"nodes\"\
          : [node_name]\n                    }\n                else:\n          \
          \          potential_scenarios[proj_stage][\"nodes\"].append(node_name)\n\
          \n    # 将场景按 N 分期严重程度排序\n    sorted_scenarios = sorted(\n        potential_scenarios.items(),\n\
          \        key=lambda x: x[1]['weight']\n    )\n\n    # --- 6. 构建 Markdown\
          \ ---\n    md = \"# \U0001FA7A 肺癌 TNM 分期智能评估报告\\n\\n\"\n\n    md += \"##\
          \ \U0001F3C1 综合分期结论\\n\"\n    md += f\"### **{stage_result}**\\n\"\n   \
          \ md += f\"> **当前确诊组合:** {normalized_t} {normalized_n} {normalized_m}\\\
          n\"\n\n    if sorted_scenarios:\n        md += \"\\n⚠️ **潜在分期变动提示:**\\n\"\
          \n        for p_n, info in sorted_scenarios:\n            nodes_str = \"\
          \ 或 \".join(info['nodes'])\n            md += f\"> * 若 **{nodes_str}** 确诊\
          \ ({normalize_stage(p_n)}) \\n\"\n            md += f\">   分期将升级为：**{info['tnm_stage']}**\
          \ (组合: {normalized_t}{normalize_stage(p_n)}{normalized_m})\\n\"\n      \
          \      md += \">\\n\"\n\n    md += \"\\n---\\n\\n\"\n\n    md += f\"###\
          \ \U0001FAC1 T分期: {normalized_t}\\n\"\n    md += \"**匹配依据:**\\n\" + format_criteria(t_data.get('matched_criteria',\
          \ []))\n    if t_data.get('logic_analysis'):\n        md += f\"> *分析: {t_data['logic_analysis']}*\\\
          n\\n\"\n\n    md += f\"### \U0001F9EC N分期: {normalized_n}\\n\"\n    md +=\
          \ \"**匹配依据:**\\n\" + format_criteria(n_data.get('matched_criteria', []))\n\
          \    md += format_uncertainty(n_data.get('uncertain_nodes', []))\n    if\
          \ n_data.get('logic_analysis'):\n        md += f\"> *分析: {n_data['logic_analysis']}*\\\
          n\\n\"\n\n    md += f\"### \U0001F52D M分期: {normalized_m}\\n\"\n    md +=\
          \ \"**匹配依据:**\\n\" + format_criteria(m_data.get('matched_criteria', []))\n\
          \    md += format_uncertainty(m_data.get('uncertain_findings', []))\n  \
          \  if m_data.get('logic_analysis'):\n        md += f\"> *分析: {m_data['logic_analysis']}*\\\
          n\"\n\n    return {\n        \"result\": md\n    }"
        code_language: python3
