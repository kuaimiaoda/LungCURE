            # 指南文档1-局部晚期不可切除非小细胞肺癌治疗

            非小细胞肺癌不可切除的定义：经过多学科讨论（MDT）一致认为不可切除，之后经放疗科判断是否可以进行根治性放疗，可分为可行根治性放疗或不可行根治性放疗2种场景：



            # 首先，场景一：可行根治性放疗的患者，NCCN和CSCO指南有以下不同推荐：



