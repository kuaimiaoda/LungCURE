            3. 对于未提供的决策条件，不得展开“若……则……”形式的条件分支；对于依赖缺失信息才能确定的细化方案，不要臆测，不要补充。当信息不足以支持细化到具体药物组合时，允许仅输出上位治疗路径。


            # 数据字段映射说明 (Data Schema Mapping)

            请严格依据以下定义解析输入的 JSON 数据，注意数字代码的特殊含义：

            驱动基因 (0 vs 文本)：

            0：代表驱动基因阴性（无突变），适用化疗/免疫方案

            具体基因名（如 "EGFR"）：代表驱动基因阳性，适用靶向治疗方案。


            治疗阶段 (1 vs 0)：

            1：代表根治性术后

            0：代表根治性术前


            既往治疗方案 (1 vs 文本)：

            1：代表初治患者（未进行过治疗），适用一线治疗方案。

            具体文本：代表经治患者（已耐药或复发），需根据描述判断处于二线或后线治疗。


            转移类型 (0 vs 1)：

            0：代表寡转移（病灶 ≤5 个），适用局部根治+全身治疗

            1：代表广泛转移，适用全身药物治疗


            是否一线治疗（0 vs 1）：

            0：代表应采用二线治疗

            1：代表应采用一线治疗


            # 指南文档1-晚期非小细胞肺癌驱动基因阳性一线治疗（初始治疗）

            不同基因变异类型（14种突变类型：分别为EGFR经典突变、EGFR罕见敏感突变、EGFR20外显子插入突变、ALK融合、ROS1融合、BRAF
            V600E突变、NTRK融合、MET14外显子跳跃突变、RET融合、KRAS G12C突变、HER2（ERBB2）突变、NRG1融合、高水平MET扩增、FGFR突变）推荐的一线治疗方案不同，可选择的药物也不同，以下是针对不同患者基因突变状况推荐的一线治疗方案和对应推荐药物：



            # 一、EGFR经典突变（EGFR19外显子缺失或21外显子L858R突变）有2种场景



            ## 首先，场景一：若患者可以应用靶向药物，一线治疗方案有以下4种方案，其中方案1为靶向药物单用，目前首选模式仍为三代EGFR靶向药物单用；方案2-4为靶向药物联合治疗模式，相对于靶向药物单用，这种模式疗效差异不明显，同时会增加副作用，因此EGFR靶向药物联合其他药物治疗这种模式是次选，除非在一些特殊的情况下才推荐靶向药物联合治疗这种模式。方案2仅在CSCO指南地位等同于靶向药物单用。



            1. 方案1：靶向药物单用：NCCN和CSCO指南均优先推荐靶向药物单用这种方案，根据2种不同的条件选择不同的EGFR靶向药物：



               * 条件1：能应用三代EGFR靶向药：药物选择方面，优先推荐三代EGFR靶向药物，有以下药物：NCCN和CSCO指南均推荐：奥希替尼；仅CSCO指南推荐：阿美替尼、伏美替尼、贝福替尼、瑞厄替尼、瑞齐替尼。

               * 条件2：如因各种原因无法应用上述三代EGFR靶向药，可以考虑二代EGFR靶向药或一代EGFR靶向药物，二代EGFR靶向药物有以下药物选择：NCCN和CSCO指南均推荐：达可替尼；仅CSCO指南推荐：阿法替尼。一代EGFR靶向药物有以下药物选择：NCCN和CSCO指南均推荐：吉非替尼、厄洛替尼；仅CSCO指南推荐：埃克替尼。仅CSCO指南推荐：在有脑转移的患者中可以用佐利替尼。



            2. 方案2：靶向药物联合化疗：联合药物针对非鳞癌可以采用奥希替尼联合培美曲塞和顺铂或卡铂。当非高龄、体力好且瘤负荷大、EGFR L858R突变、脑转移、家属积极要求治疗时考虑靶向药物联合化疗。

            3. 方案3：靶向药物联合抗血管生成治疗：如因各种原因无法应用三代EGFR靶向药物，一代EGFR靶向药物联合抗血管生成也是一个备选方案，药物选择有：NCCN和CSCO指南均推荐：厄洛替尼联合贝伐珠单抗（非鳞癌）；仅NCCN指南推荐厄洛替尼联合雷莫卢单抗。

            4. 方案4：靶向药物联合单抗类药物：药物选择可以有埃万妥单抗联合拉泽替尼。



            ## 其次，场景二：在无法应用任何EGFR靶向治疗的情况下，CSCO指南还推荐含铂双药化疗联合贝伐珠单抗作为无法应用靶向药的次选方案。



            # 二、EGFR罕见敏感突变（EGFR18外显子G719X突变或EGFR20外显子S768I突变或EGFR21外显子L861Q突变）：一线治疗只推荐EGFR靶向药物单用，有2种方案可以选择：



            1. 方案1：NCCN指南优先推荐这两种药物：奥希替尼、阿法替尼。

            2. 方案2：如因各种原因无法应用上述EGFR靶向药，NCCN指南推荐可以考虑达可替尼、吉非替尼、厄洛替尼。



            # 三、EGFR突变（EGFR20外显子插入突变）：一线治疗推荐以下2种方案



            1. 方案1：NCCN和CSCO指南均优先推荐在非鳞癌中应用埃万妥单抗联合培美曲塞和卡铂。

            2. 方案2：鳞癌或无法应用埃万妥单抗联合培美曲塞和卡铂的情况，可以考虑按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            # 四、ALK融合：一线治疗推荐以下3种方案，其中方案1-2地位均是优先推荐：



            1. 方案1：NCCN和CSCO指南均优先推荐三代ALK靶向药物单用，可选药物如下：NCCN和CSCO指南均推荐洛拉替尼。

            2. 方案2：NCCN和CSCO指南均推荐二代ALK靶向药物单用，地位等同于三代ALK靶向药物单用：NCCN和CSCO指南均推荐：阿来替尼、布格替尼、恩沙替尼、赛瑞替尼（NCCN指南次选推荐）；仅CSCO指南推荐：伊鲁阿克、依奉阿克。

            3. 方案3：各种原因无法应用上述三代ALK靶向药或二代ALK靶向药，NCCN和CSCO指南推荐使用：一代ALK靶向药物：克唑替尼（NCCN指南次选推荐，CSCO指南优先推荐）。

            4. 方案4：如因各种原因无法应用上述ALK靶向药，CSCO指南次选推荐含铂双药化疗联合贝伐珠单抗（非鳞癌）、含铂双药化疗。



            # 五、ROS1融合：一线治疗推荐以下3种方案，其中方案1-2地位均是优先推荐：



            1. 方案1：NCCN和CSCO指南均推荐一代ROS1靶向药物：克唑替尼。

            2. 方案2：NCCN和CSOC指南均推荐二代ROS1靶向药物：恩曲替尼、瑞普替尼、他雷替尼；仅CSCO指南推荐：安奈克替尼。

            3. 方案2：如因各种原因无法应用上述ROS1靶向药，CSCO指南次选推荐含铂双药化疗联合贝伐珠单抗（非鳞癌）、含铂双药化疗。



            # 六、BRAF V600E突变：一线治疗推荐以下3种方案：



            1. 方案1：NCCN和CSCO指南均优先推荐双靶药物方案，药物可选择：达拉菲尼联合曲美替尼、康奈非尼联合比美替尼。

            2. 方案2：若无法应用BRAF双靶方案，NCCN指南推荐单靶向药物方案：达拉菲尼、维莫非尼。

            3. 方案3：若无法应用上述BRAF靶向药物，可按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            # 七、NTRK融合：一线治疗推荐以下2种方案：



            1. 方案1：NCCN和CSCO指南均优先推荐NTRK靶向药物单用方案，药物选择：恩曲替尼、拉罗替尼；仅NCCN指南推荐药物：瑞普替尼。

            2. 方案2：若无法应用上述NTRK靶向药物，可按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            # 八、MET14外显子跳跃突变：一线治疗推荐以下3种方案：



            1. 方案1：NCCN和CSCO指南均优先推荐MET靶向药物单用方案，药物选择：卡马替尼、特泊替尼；仅CSCO指南推荐药物：赛沃替尼、谷美替尼、伯瑞替尼。

            2. 方案2：若无法使用上述MET靶向药物，NCCN指南推荐可使用克唑替尼。

            3. 方案3：若无法应用上述所有MET靶向药物，可按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            # 九、RET融合：一线治疗推荐以下2种方案：



            1. 方案1：NCCN和CSCO指南均优先推荐RET靶向药物单用方案，药物选择：赛普替尼、普拉替尼。

            2. 方案2：若无法应用上述RET靶向药物，可按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            # 十、KRAS G12C突变：



            1. 优先推荐按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗，一线方案失败（进展或不耐受）后推荐KRAS靶向药治疗。



            # 十一、HER2（ERBB2）突变：



            1. 优先推荐按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗，一线方案失败（进展或不耐受）后推荐HER2靶向药治疗。



            # 十二、NRG1融合：



            1. 优先推荐按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗，一线方案失败（进展或不耐受）后推荐NRG1靶向药治疗。



            # 十三、高水平MET扩增（拷贝数≥10）：一线治疗推荐以下2种方案：



            1. 方案1：NCCN指南推荐可以应用MET靶向药，药物选择：卡马替尼、特泊替尼、克唑替尼。

            2. 方案2：若无法应用上述MET靶向药物，可按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            # 十四、FGFR突变：一线治疗推荐以下2种方案：



            1. 方案1：NCCN指南推荐可以应用FGFR靶向药，药物选择：厄达替尼。

            2. 方案2：若无法应用上述FGFR靶向药物，可按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。









