            ## CSCO指南推荐：CSCO指南根据不同的体力情况，有不同的情况：



            ### 情况1：体力评分（PS=0-1分），有以下2种方案：



            1. 方案1：根治性同步放化疗：CSCO指南优先推荐此方案。化疗方案有以下可选药物： 培美曲塞联合顺铂或卡铂（非鳞癌）、紫杉醇联合顺铂或卡铂、依托泊苷联合顺铂、多西他赛联合顺铂。根治性同步放化疗后，根据是否有EGFR敏感突变，有以下2种条件：



               * 条件1：若患者有EGFR敏感突变（EGFR19外显子缺失或21外显子L858R突变），有以下药物选择： 应用奥希替尼或阿美替尼至疾病进展。

               * 条件2：若患者没有EGFR敏感突变（EGFR19外显子缺失或21外显子L858R突变），有以下药物选择：应用度伐利尤单抗或应用舒格利单抗。



            2. 方案2：化疗序贯根治性放疗：CSCO指南次选推荐此方案。化疗方案有以下可选药物：紫杉醇联合顺铂、长春瑞滨联合顺铂。化疗序贯根治性放疗后，根据是否有EGFR敏感突变，有以下2种条件：



               * 条件1：若患者有EGFR敏感突变（EGFR19外显子缺失或21外显子L858R突变），有以下药物选择：应用奥希替尼或阿美替尼至疾病进展。

               * 条件2：若患者没有EGFR敏感突变（EGFR19外显子缺失或21外显子L858R突变），有以下药物选择：应用度伐利尤单抗或舒格利单抗。



            ### 情况2：对于体力评分（PS=2分）、无法耐受同步放化疗的患者，CSCO指南推荐单纯放疗或根治性放疗序贯化疗，化疗方案有以下可选药物：CSCO指南推荐：紫杉醇联合卡铂、培美曲塞联合顺铂或卡铂（非鳞癌）。



            # 其次，场景二：不可行根治性放疗的患者，按照晚期非小细胞肺癌驱动基因阳性一线治疗或晚期非小细胞肺癌驱动基因阴性一线治疗进行治疗。





