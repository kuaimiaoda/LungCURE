            # 指南文档-晚期孤立性转移或寡转移非小细胞肺癌治疗

            寡转移定义：诊断时就已经存在的转移灶，并且病灶≤5个；寡转移中，一类比较特殊的情况，称之为孤立性转移，定义是：诊断时就已经存在的转移灶，并且病灶数目仅1个。非小细胞肺癌寡转移虽然是Ⅳ期，但部分寡转移或孤立转移患者有根治性治疗机会。根据患者的肺部病灶能否根治性治疗，分为以下2个场景：



            # 首先，场景一、肺部病灶可以根治性手术或放疗，NCCN和CSCO指南分别有以下推荐：



            ## NCCN指南：针对脑部寡转移或其他部位寡转移并且肺部病灶可根治性治疗的患者，推荐进行以下治疗。根据体力评分的不同，有以下2种情况：



            ### 情况1：体力评分（PS=0-2分），推荐这部分患者分别进行转移灶的处理和肺部病灶的根治性治疗。



            * 转移灶的处理：根据转移部位的不同，有以下2种方案：



              1. 方案1：对于孤立性脑转移或脑部寡转移患者：优先推荐：先进行脑部局部放疗，再针对肺部病灶进行根治性治疗；在脑部症状需要手术缓解或诊断需要手术取得病理的情况下，推荐先进行脑部手术治疗，后进行脑部局部放疗，再针对肺部病灶进行根治性治疗。

              2. 方案2：对于其他部位孤立转移或寡转移患者：推荐在针对肺部病灶根治性治疗后，再针对转移病灶进行根治性局部治疗（手术、放疗、消融）。



            * 肺部病灶的根治性治疗：根据不同的病理分期，有以下3种方案。全身治疗方案参考晚期非小细胞肺癌驱动基因阴性一线治疗方案或晚期非小细胞肺癌驱动基因阳性一线治疗方案，可在根治性手术或放疗之前或之后进行。



              1. 方案1：病理分期为T1-T3N0：推荐手术切除或根治性放疗。

              2. 方案2：病理分期为T1-T3N1：优先推荐同步放化疗，次选推荐手术治疗、根治性放疗。

              3. 方案3：病理分期为T1-T3N2，T4N0-N2：仅推荐根治性同步放化疗。



            ### 情况2：体力评分（PS=3-4分）：推荐仅进行最佳支持治疗，不做抗癌治疗。



            ## CSCO指南：针对孤立性脑转移、孤立性肾上腺或孤立性骨转移并且肺部病灶可根治性治疗的患者，推荐进行以下治疗。根据体力评分的不同，有以下3种情况：



            ### 情况1：体力评分（PS=0-1分），根据转移灶的不同，有以下2种条件：



            1. 条件1：对于孤立性脑转移或肾上腺转移的患者，根据肺部病灶能否手术治疗，分为以下2种情境：



               1. 模式1：肺部病灶为N0-N1且可完全性切除：有以下2种方案：



                  1. 方案1：脑或肾上腺病灶手术切除，联合肺原发病灶完全性切除，联合辅助化疗，这种方案是优先推荐方案；对于孤立性脑转移的患者，还可考虑以下方案：脑部病灶局部放疗，联合肺原发病灶完全性切除，联合辅助化疗。

                  2. 方案2：脑或肾上腺病灶局部放疗，联合肺原发病灶局部放疗，联合辅助化疗，这种方案是次选推荐方案。



               2. 模式2：肺部病灶为T4或N2且可行根治性放疗的患者，推荐以下治疗：脑部或肾上腺病灶局部放疗，联合肺原发病灶同步或序贯放化疗。



            2. 条件2：对于孤立性骨转移的患者，根据肺部病灶能否手术治疗，分为以下2种情境：



               1. 模式1：肺部病灶为N0-N1且可完全性切除的患者，推荐以下方案：肺部原发病灶完全性切除，联合骨转移病变放疗，联合辅助化疗，联合双膦酸盐或地舒单抗治疗。

               2. 模式2：肺部病灶为N2或T4的患者，推荐以下方案：肺部原发病灶序贯或同步放化疗，联合骨转移病变放疗，联合辅助化疗，联合双膦酸盐或地舒单抗治疗。



            ### 情况2：体力评分（PS=2分）：推荐按照晚期非小细胞肺癌驱动基因阴性一线治疗方案或晚期非小细胞肺癌驱动基因阳性一线治疗方案进行治疗。



            ### 情况3：体力评分（PS=3-4分）：推荐仅进行最佳支持治疗，不做抗癌治疗。



            # 其次，场景二、肺部病灶无法根治性手术或放疗



            NCCN和CSCO指南均推荐：按照按照晚期非小细胞肺癌驱动基因阴性一线治疗方案或晚期非小细胞肺癌驱动基因阳性一线治疗方案进行治疗。


