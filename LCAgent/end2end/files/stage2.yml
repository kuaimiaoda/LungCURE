            # 指南文档2-晚期非小细胞肺癌驱动基因阳性二线治疗

            不同基因变异类型（14种突变类型：分别为EGFR经典突变、EGFR罕见敏感突变、EGFR20外显子插入突变、ALK融合、ROS1融合、BRAF
            V600E突变、NTRK融合、MET14外显子跳跃突变、RET融合、KRAS G12C突变、HER2（ERBB2）突变、NRG1融合、高水平MET扩增、FGFR突变）和不同进展情况（6种进展情况分别为：寡进展无症状、寡进展有症状、脑转移有症状、脑转移无症状、广泛进展有症状、广泛进展无症状）的患者选用的方案不同，以下是针对不同基因变异类型的情况，通过不同的场景和进展情况，给出不同的治疗方案，并列举不同方案所用的治疗药物。



            ## 一、EGFR敏感突变（EGFR经典突变：EGFR19外显子缺失或21外显子L858R突变；EGFR罕见敏感突变：EGFR18外显子G719X突变或EGFR20外显子S768I突变或EGFR21外显子L861Q突变）一线治疗时应用一代或二代EGFR靶向药进展后，再次进行基因检测，根据T790M突变状态分为T790M突变阴性和阳性两种场景：



            ### 首先，场景一：若应用一代EGFR靶向药或二代EGFR靶向药一线治疗后进展，并检测出T790M突变阳性，有以下两种情况：



            1. 情况1：若应用一代EGFR靶向药或二代EGFR靶向药一线治疗后进展，出现寡进展（全身进展灶≤5个）或中枢神经系统进展（脑转移），无论是否有相关症状，有2种可选方案（优先推荐方案2）：



               * 方案1：可继续原一代或二代EGFR靶向药物治疗，同时针对进展部位联合局部治疗（局部治疗主要是立体定向放疗）。

               * 方案2：可更换三代EGFR靶向药物治疗，有以下药物可选：NCCN和CSCO指南均推荐奥希替尼；仅CSCO指南推荐的药物有：阿美替尼、伏美替尼、贝福替尼、瑞厄替尼、瑞齐替尼。



            2. 情况2：若应用一代EGFR靶向药或二代EGFR靶向药一线治疗后进展，出现疾病广泛进展（非寡进展，全身进展灶＞5个）无论是否有相关症状，更换三代EGFR靶向药物治疗，有以下药物可选：NCCN和CSCO指南均推荐奥希替尼；仅CSCO指南推荐的药物有：阿美替尼、伏美替尼、贝福替尼、瑞厄替尼、瑞齐替尼。



            ### 其次，场景二：若一线治疗时未应用过三代EGFR靶向药物后进展并检测出T790M突变阴性，或一线治疗应用过三代EGFR靶向药物治疗后进展，经医患共同决策后，根据身体情况的不同，可以给出不同方案：



            1. 情况1：应用一代EGFR靶向药或二代EGFR靶向药一线治疗后检测T790M突变阴性，或应用过三代EGFR靶向药后进展，若出现寡进展（全身进展灶≤5个）且无相关症状，或中枢神经系统进展（脑转移）且无论是否有相关症状，都可以继续原EGFR靶向药治疗，同时针对进展部位联合局部治疗（局部治疗主要是立体定向放疗）。

            2. 情况2：应用一代EGFR靶向药或二代EGFR靶向药一线治疗后检测T790M突变阴性，或应用过三代EGFR靶向药后进展，若出现寡进展（全身进展灶≤5个）且有相关症状，可以继续原EGFR靶向药物治疗，同时针对进展部位联合局部治疗（局部治疗主要是立体定向放疗）。还可以选择按照情况3列举的方案进行治疗。

            3. 情况3：若应用一代EGFR靶向药或二代EGFR靶向药一线治疗后检测T790M突变阴性，或应用过三代EGFR靶向药后进展，出现肿瘤相关症状且疾病广泛进展（非寡进展，全身进展灶＞5个），无论是否有相关症状，都建议更换方案，经医患共同决策后，有以下6种方案可选：



               * 方案1：若之前从未应用过埃万妥单抗，NCCN指南优先推荐埃万妥单抗联合培美曲塞和卡铂（非鳞癌）。

               * 方案2：NCCN和CSCO指南均推荐在非鳞癌患者中，可应用含铂双药化疗联合贝伐珠单抗方案，有以下药物可选：卡铂联合紫杉醇联合贝伐珠单抗、卡铂联合培美曲塞联合贝伐珠单抗、顺铂联合培美曲塞联合贝伐珠单抗。

               * 方案3：NCCN和CSCO指南均推荐可应用单独化疗方案，有以下药物可选：白蛋白紫杉醇联合卡铂、多西他赛联合卡铂、依托泊苷联合卡铂、吉西他滨联合卡铂、紫杉醇联合卡铂、培美曲塞联合卡铂（非鳞癌）、多西他赛联合顺铂、依托泊苷联合顺铂、吉西他滨联合顺铂、紫杉醇联合顺铂、培美曲塞联合顺铂（非鳞癌）。

               * 方案4：NCCN和CSCO指南均推荐四药联合方案，药物有：NCCN指南推荐：紫杉醇联合卡铂联合贝伐珠单抗联合阿替利珠单抗；CSCO指南推荐：培美曲塞联合顺铂联合贝伐珠单抗联合信迪利单抗（非鳞癌）。

               * 方案5：CSCO指南推荐可应用培美曲塞联合卡铂联合依沃西单抗（非鳞癌）。

               * 方案6：CSCO指南推荐可应用ADC类药物，药物有：芦康沙妥珠单抗。



            ## 二、EGFR突变（EGFR20外显子插入突变）进展后，根据一线治疗方案的不同，有不同方案推荐：



            1. 情况1：之前按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗进展后，推荐靶向药方案，NCCN指南和CSCO指南均推荐可选择药物：埃万妥单抗、舒沃替尼。

            2. 情况2：之前应用过埃万妥单抗联合培美曲塞和卡铂后进展，推荐换用靶向药方案，NCCN和CSCO指南均推荐换用舒沃替尼治疗。



            ## 三、ALK融合进展后，根据进展情况不同，有以下推荐方案：



            1. 情况1：若应用ALK靶向药物一线治疗后，若出现寡进展（全身进展灶≤5个）且无相关症状，或中枢神经系统进展（脑转移）且无论是否有相关症状，经过医患共同决策后，有以下3种可选方案：



               * 方案1：可继续原ALK靶向药物治疗，同时针对进展部位联合局部治疗（局部治疗主要是立体定向放疗）。

               * 方案2：若之前只应用过一代ALK靶向药，NCCN和CSCO指南均推荐换用二代或三代ALK靶向药：二代ALK靶向药物推荐如下：NCCN和CSCO指南均推荐：阿来替尼、布格替尼、恩沙替尼、赛瑞替尼（NCCN指南次选推荐）；仅CSCO指南推荐：伊鲁阿克、依奉阿克；三代ALK靶向药物推荐如下：NCCN和CSCO指南均推荐：洛拉替尼。

               * 方案3：若之前只应用过二代ALK靶向药，NCCN和CSCO指南均推荐换用三代ALK靶向药：洛拉替尼。



            2. 情况2：若寡进展（全身进展灶≤5个）的患者有相关症状，除了可以应用上述情况1的方案，还有以下3种方案可选：



               * 方案1：NCCN指南推荐四药联合方案，药物有：紫杉醇联合卡铂联合贝伐珠单抗联合阿替利珠单抗。

               * 方案2：NCCN和CSCO指南均推荐在非鳞癌患者中，可应用含铂双药化疗联合贝伐珠单抗方案，有以下药物可选：卡铂联合紫杉醇联合贝伐珠单抗、卡铂联合培美曲塞联合贝伐珠单抗、顺铂联合培美曲塞联合贝伐珠单抗。

               * 方案3：NCCN和CSCO指南均推荐可应用单独化疗方案，有以下药物可选：白蛋白紫杉醇联合卡铂、多西他赛联合卡铂、依托泊苷联合卡铂、吉西他滨联合卡铂、紫杉醇联合卡铂、培美曲塞联合卡铂（非鳞癌）、多西他赛联合顺铂、依托泊苷联合顺铂、吉西他滨联合顺铂、紫杉醇联合顺铂、培美曲塞联合顺铂（非鳞癌）。



            3. 情况3：若应用ALK靶向药物一线治疗后，出现肿瘤相关症状且疾病广泛进展（非寡进展，全身进展灶＞5个），无论是否有相关症状，根据以下3种不同条件，有不同方案：



               * 条件1：若之前只应用过一代ALK靶向药，CSCO指南推荐换用二代ALK靶向药或三代ALK靶向药。



                 * 方案1：二代ALK靶向药物推荐如下：阿来替尼、布格替尼、恩沙替尼、赛瑞替尼、伊鲁阿克、依奉阿克

                 * 方案2：三代ALK靶向药物推荐如下：洛拉替尼。



               * 条件2：若之前只应用过二代ALK靶向药，CSCO指南推荐换用三代ALK靶向药：洛拉替尼。

               * 条件3：无论一线治疗应用何种ALK靶向药后进展，还有以下3种方案可选：



                 * 方案1：NCCN指南推荐四药联合方案，药物有：紫杉醇联合卡铂联合贝伐珠单抗联合阿替利珠单抗。

                 * 方案2：NCCN和CSCO指南均推荐在非鳞癌患者中，可应用含铂双药化疗联合贝伐珠单抗方案，有以下药物可选：卡铂联合紫杉醇联合贝伐珠单抗、卡铂联合培美曲塞联合贝伐珠单抗、顺铂联合培美曲塞联合贝伐珠单抗。

                 * 方案3：NCCN和CSCO指南均推荐可应用单独化疗方案，有以下药物可选：白蛋白紫杉醇联合卡铂、多西他赛联合卡铂、依托泊苷联合卡铂、吉西他滨联合卡铂、紫杉醇联合卡铂、培美曲塞联合卡铂（非鳞癌）、多西他赛联合顺铂、依托泊苷联合顺铂、吉西他滨联合顺铂、紫杉醇联合顺铂、培美曲塞联合顺铂（非鳞癌）。



            ## 四、ROS1融合进展后，根据进展情况不同，有以下推荐方案：



            1. 情况1：若应用ROS1靶向药物一线治疗后，若出现寡进展（全身进展灶≤5个）且无相关症状，或中枢神经系统进展（脑转移）且没有相关症状，经过医患共同决策后，有以下2种条件：



               * 条件1：继续原ROS1靶向药物治疗，同时针对进展部位联合局部治疗（局部治疗主要是立体定向放疗）。

               * 条件2：根据一线用药的不同，换用不同药物：



                 * 方案1：之前一线用药是克唑替尼：可换用瑞普替尼、他雷替尼、洛拉替尼。

                 * 方案2：之前一线用药是恩曲替尼：可换用瑞普替尼、洛拉替尼。

                 * 方案3：之前一线用药是瑞普替尼：可换用洛拉替尼。

                 * 方案4：之前一线用药是他雷替尼：可换用洛拉替尼。



            2. 情况2：若寡进展（全身进展灶≤5个）的患者有相关症状，除了上述情况1所提供的方案外，还有其他2种方案可选：



               * 方案1：NCCN和CSCO指南均推荐在非鳞癌患者中，可应用含铂双药化疗联合贝伐珠单抗方案，有以下药物可选：卡铂联合紫杉醇联合贝伐珠单抗、卡铂联合培美曲塞联合贝伐珠单抗、顺铂联合培美曲塞联合贝伐珠单抗。

               * 方案2：NCCN和CSCO指南均推荐可应用单独化疗方案，有以下药物可选：白蛋白紫杉醇联合卡铂、多西他赛联合卡铂、依托泊苷联合卡铂、吉西他滨联合卡铂、紫杉醇联合卡铂、培美曲塞联合卡铂（非鳞癌）、多西他赛联合顺铂、依托泊苷联合顺铂、吉西他滨联合顺铂、紫杉醇联合顺铂、培美曲塞联合顺铂（非鳞癌）。



            3. 情况3：若应用ROS1靶向药物一线治疗后出现中枢神经系统进展（脑转移）且有相关症状，则需要换用对脑转移病灶敏感的药物，有以下2种tiaoj：



               * 条件1：NCCN指南推荐：根据一线治疗用药方案的不同，有以下不同方案



                 * 方案1：原一线应用的ROS1靶向药是克唑替尼，必须换用ROS1靶向药，可选药物如下：优先推荐：洛拉替尼、瑞普替尼、他雷替尼；次选推荐恩曲替尼。

                 * 方案2：原一线应用的ROS1靶向药不是克唑替尼，可以继续应用原ROS1靶向药同时针对脑转移部位联合局部治疗（局部治疗主要是立体定向放疗）。也可以换用洛拉替尼。



               * 条件2：NCCN指南推荐还可以参加临床试验。



            4. 情况4：若应用ROS1靶向药物一线治疗后，出现肿瘤相关症状且疾病广泛进展（非寡进展，全身进展灶＞5个），有以下3种条件：



               * 条件1：根据一线用药的不同，换用不同药物：



                 * 方案1：之前一线用药是克唑替尼：可换用瑞普替尼、他雷替尼、洛拉替尼。

                 * 方案2：之前一线用药是恩曲替尼：可换用瑞普替尼、洛拉替尼。

                 * 方案3：之前一线用药是瑞普替尼：可换用洛拉替尼。

                 * 方案4：之前一线用药是他雷替尼：可换用洛拉替尼。



               * 条件2：NCCN和CSCO指南均推荐在非鳞癌患者中，可应用含铂双药化疗联合贝伐珠单抗方案，有以下药物可选：卡铂联合紫杉醇联合贝伐珠单抗、卡铂联合培美曲塞联合贝伐珠单抗、顺铂联合培美曲塞联合贝伐珠单抗。

               * 条件3：NCCN和CSCO指南均推荐可应用单独化疗方案，有以下药物可选：白蛋白紫杉醇联合卡铂、多西他赛联合卡铂、依托泊苷联合卡铂、吉西他滨联合卡铂、紫杉醇联合卡铂、培美曲塞联合卡铂（非鳞癌）、多西他赛联合顺铂、依托泊苷联合顺铂、吉西他滨联合顺铂、紫杉醇联合顺铂、培美曲塞联合顺铂（非鳞癌）。



            ## 五、BRAF V600E突变进展后：



            1. 方案1：若之前应用过BRAF靶向药一线治疗后进展，按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            ## 六、NTRK融合进展后：



            1. 方案1：若之前应用过NTRK靶向药一线治疗后进展，按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            ## 七、MET14外显子跳跃突变进展后：



            1. 方案1：若之前应用过MET靶向药一线治疗后进展，按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            ## 八、RET融合进展后：



            1. 方案1：若之前应用过RET靶向药一线治疗后进展，按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            ## 九、KRAS G12C突变进展后：



            1. 方案1：之前按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗进展后，可以应用KRAS G12C靶向药，药物选择：NCCN和CSCO均推荐阿达格拉西布（CSCO指南次选推荐）；仅NCCN指南推荐索托拉西布；仅CSCO指南推荐：氟泽雷塞、格索雷塞。



            ## 十、HER2（ERBB2）突变进展后：



            1. 方案1：之前按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗进展后，可以应用HER2靶向药物，药物选择：NCCN和CSCO指南均优先推荐德曲妥珠单抗；仅NCCN指南优先推荐：宗格替尼；仅CSCO指南次选推荐吡格替尼。

            2. 方案1：之前按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗进展后，若上述德曲妥珠单抗、宗格替尼、吡格替尼都不可用，NCCN指南推荐可选择恩美曲妥珠单抗，也是一个次选方案。



            ## 十一、NRG1融合进展后：



            1. 方案1：之前按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗进展后，可以应用NRG1靶向药物，药物选择：NCCN和CSCO指南均推荐泽妥珠单抗。



            ## 十二、高水平MET扩增（拷贝数≥10）：



            1. 方案1：若之前应用过MET靶向药一线治疗后进展，按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。



            ## 十三、FGFR突变进展后：

            1. 方案1：若之前应用过FGFR靶向药一线治疗进展后，按照晚期非小细胞肺癌驱动基因阴性一线方案进行治疗。


            # 指南文档3-晚期非小细胞肺癌驱动基因阳性后线治疗

            对于晚期非小细胞肺癌驱动基因阳性经过一线和二线治疗后的患者，根据身体情况的不同（体力评分（PS=0~2分）、体力评分（PS=3~4分））和既往治疗方案的不同，有以下不同方案推荐：



            # 一、体力评分（PS=0~2分），根据既往治疗方案及病理类型、分子病理类型的不同，有以下方案：



            1. 方案1：单药免疫治疗方案，NCCN指南推荐在既往没有应用过免疫检查点抑制剂治疗的患者中采用这种方案，有以下药物可以选择：纳武利尤单抗、帕博利珠单抗、阿替利珠单抗。

            2. 方案2：单独化疗方案，在无论既往是否使用过免疫检查点抑制剂治疗的患者当中，NCCN和CSCO指南均优先推荐采用这种方案，化疗药物尽量选择一二线未使用过的化疗药物，药物选择如下：多西他赛、培美曲塞（非鳞癌）、吉西他滨、白蛋白紫杉醇。

            3. 方案3：NCCN指南还可推荐化疗联合抗血管治疗方案：雷莫卢单抗联合多西他赛。

            4. 方案4：在HER2高表达（HER2 IHC 3+）的患者中，NCCN指南推荐可应用德曲妥珠单抗治疗。

            5. 方案5：在MET 高表达（c-Met/MET ≥50% IHC 3+）且EGFR野生型的非鳞癌患者中，NCCN指南推荐可应用维汀-特立妥珠单抗（Telisotuzumab
            vedotin-tllv）治疗。

            6. 方案6：CSCO指南推荐在三线或三线以上可应用安罗替尼。

            7. 方案7：NCCN指南推荐：在EGFR19外显子缺失或21外显子L858R突变患者（既往接受过靶向和含铂化疗）中可以应用ADC药物德达博妥单抗。



            # 二、体力评分（PS=3~4分），仅推荐1种方案：



            1. 方案1：采用最佳支持治疗模式：不进行任何抗癌治疗（包括化疗、免疫治疗）。

